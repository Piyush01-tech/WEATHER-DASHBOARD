services:
  - type: web
    name: weather-dashboard-backend
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://piyush01-tech.github.io
