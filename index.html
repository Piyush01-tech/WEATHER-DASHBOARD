<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Weather dashboard with real-time forecasts for any city worldwide.">
  <title>piyush01-tech — Weather Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="loading">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p>Fetching weather&hellip;</p>
    </div>
  </div>

  <header class="primary">
    <div class="header-inner">
      <div class="header-brand">
        <span class="brand-dot"></span>
        <h1>piyush01-tech</h1>
      </div>
      <div class="header-right">
        <span class="header-subtitle">Real-time forecasts</span>
        <button id="unit_toggle"></button>
      </div>
    </div>
  </header>

  <main class="grid-x">

    <div class="search_div">
      <div class="panel-label">Search Location</div>
      <form>
        <select id="city_select">
          <option value="">Quick pick a city…</option>
        </select>

        <div class="or-divider">or</div>

        <input type="text" id="city_input" placeholder="Type a city name…" />

        <select id="select_country">
          <option value="">Select country</option>
        </select>

        <input type="submit" id="form_submit" value="Search" />
      </form>

      <div id="past_searches">
        <div class="section-label">Recent</div>
        <ul id="city_names"></ul>
      </div>
    </div>

    <div class="results_div">

      <div class="placeholder-msg" id="placeholder">
        <span class="placeholder-icon">🌤</span>
        <p>Search for a city to see the weather</p>
      </div>

      <div id="city_details" style="display:none;">
        <div class="weather-hero">
          <div class="weather-hero-left">
            <span class="weather-label">Current Weather</span>
            <h2 id="city_name"></h2>
            <p class="city_temp">
              <span class="weather_param">Temp:</span>
              <span class="temp">--</span>
              <span class="temp-unit"></span>
            </p>
          </div>
          <div class="current_icon"></div>
        </div>

        <div class="weather-details-row">
          <div class="weather-detail-item">
            <div class="detail-icon">💨</div>
            <span class="detail-label">Wind</span>
            <span class="detail-value wind">--</span>
          </div>
          <div class="weather-detail-item">
            <div class="detail-icon">💧</div>
            <span class="detail-label">Humidity</span>
            <span class="detail-value humidity">--</span>
          </div>
          <div class="weather-detail-item">
            <div class="detail-icon">🌡</div>
            <span class="detail-label">Feels Like</span>
            <span class="detail-value feels-like">--</span>
          </div>
        </div>
      </div>

      <div id="five_day_weather" style="display:none;">
        <h2>5-Day Forecast</h2>
      </div>

    </div>
  </main>

  <script src="js/scripts.js"></script>
</body>
</html>
